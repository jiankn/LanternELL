# ============================================
# LanternELL Wrangler Configuration
# ============================================

name = "lanternell"
main = ".open-next/worker.js"
compatibility_date = "2026-03-06"
compatibility_flags = ["nodejs_compat"]
preview_urls = true
observability = { enabled = true }
keep_vars = true

[assets]
directory = ".open-next/assets"

# ------------------
# Database (D1)
# ------------------
[[d1_databases]]
binding = "DB"
database_name = "lanternell-prod"
database_id = "bd811246-1a4c-413b-a10a-d3c6a4e65654"
migrations_dir = "migrations"

# ------------------
# R2 Storage
# ------------------
[[r2_buckets]]
binding = "FILES"
bucket_name = "lanternell-files-prod"

[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "lanternell-cache-prod"

# ------------------
# Queues
# ------------------
[queues]
producers = [
  { binding = "CONTENT_QUEUE", queue = "lanternell-content" },
  { binding = "RENDER_QUEUE", queue = "lanternell-render" },
  { binding = "EMAIL_QUEUE", queue = "lanternell-email" },
  { binding = "WEBHOOK_QUEUE", queue = "lanternell-webhook" }
]
# Note: Queue consumers require a separate worker with queue() export.
# OpenNext workers only export fetch(). Async processing is handled
# via internal API routes called from the queue producer side.

# ------------------
# Browser Rendering (for PDF generation)
# ------------------
[browser]
binding = "BROWSER"

# ------------------
# Cron Triggers
# ------------------
[triggers]
crons = [
  "0 3 * * *",   # Daily 3 AM UTC — cleanup stale rate limits + expired tokens
  "0 6 * * 1"    # Weekly Monday 6 AM UTC — sitemap ping
]

# ------------------
# Environment Variables
# ------------------
[vars]
APP_ENV = "production"
APP_URL = "https://lanternell.com"
NEXT_PUBLIC_SITE_URL = "https://lanternell.com"
EMAIL_FROM = "LanternELL <noreply@lanternell.com>"
AI_ACTIVE_PROVIDER = "gemini"
AI_FALLBACK_PROVIDER = "deepseek"
ZHIPUAI_MODEL = "glm-4.7"
ZHIPUAI_BASE_URL = "https://open.bigmodel.cn/api/paas/v4"
OPENAI_MODEL = "gpt-4o"
OPENAI_BASE_URL = "https://api.openai.com/v1"
DEEPSEEK_MODEL = "deepseek-chat"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
GEMINI_MODEL = "gemini-2.5-flash"
GEMINI_BASE_URL = "https://generativelanguage.googleapis.com/v1beta"

# Stripe Price IDs
STRIPE_PRICE_STANDARD = "price_1T8XQWIYmPyPP8DQt64oBiCM"
STRIPE_PRICE_PLUS = "price_1T8XQWIYmPyPP8DQoSqYt3CB"
STRIPE_PRICE_PREMIUM = "price_1T8XQXIYmPyPP8DQyJSSzsIl"
STRIPE_PRICE_MINI_BUNDLE = "price_1T8XQXIYmPyPP8DQIPCJXjrZ"
STRIPE_PRICE_FULL_BUNDLE = "price_1T8XQYIYmPyPP8DQQfdu9Nqt"
STRIPE_PRICE_MONTHLY = "price_1T8XQZIYmPyPP8DQ45XIZGyM"
STRIPE_PRICE_ANNUAL = "price_1T8XQZIYmPyPP8DQ0NeNGBt6"

# ------------------
# Secrets (set via wrangler CLI)
# ------------------
# npx wrangler secret put ZHIPUAI_API_KEY
# npx wrangler secret put OPENAI_API_KEY
# npx wrangler secret put DEEPSEEK_API_KEY
# npx wrangler secret put GEMINI_API_KEY
# npx wrangler secret put STRIPE_SECRET_KEY
# npx wrangler secret put STRIPE_WEBHOOK_SECRET
# npx wrangler secret put RESEND_API_KEY
# npx wrangler secret put ADMIN_EMAIL_ALLOWLIST
# npx wrangler secret put GOOGLE_CLIENT_ID
# npx wrangler secret put GOOGLE_CLIENT_SECRET

# ============================================
# Preview Environment
# ============================================
[env.preview]
name = "lanternell-preview"
[env.preview.vars]
APP_ENV = "preview"
APP_URL = "https://lanternell-preview.workers.dev"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "lanternell-preview"
database_id = "REPLACE_WITH_PREVIEW_DB_ID"
migrations_dir = "migrations"

[[env.preview.r2_buckets]]
binding = "FILES"
bucket_name = "lanternell-files-preview"
