# ============================================
# LanternELL Wrangler Configuration
# ============================================

name = "lanternell-web"
main = ".worker-next/index.mjs"
compatibility_date = "2026-03-06"
compatibility_flags = ["nodejs_compat"]
preview_urls = true
observability = { enabled = true }

[assets]
directory = ".worker-next/assets"

# ------------------
# Database (D1)
# ------------------
[[d1_databases]]
binding = "DB"
database_name = "lanternell-prod"
database_id = "bd811246-1a4c-413b-a10a-d3c6a4e65654"
migrations_dir = "migrations"

# ------------------
# R2 Storage
# ------------------
[[r2_buckets]]
binding = "FILES"
bucket_name = "lanternell-files-prod"

# ------------------
# Queues (enable after creating queues via: npx wrangler queues create <name>)
# ------------------
# [queues]
# producers = [
#   { binding = "CONTENT_QUEUE", queue = "lanternell-content" },
#   { binding = "RENDER_QUEUE", queue = "lanternell-render" },
#   { binding = "EMAIL_QUEUE", queue = "lanternell-email" },
#   { binding = "WEBHOOK_QUEUE", queue = "lanternell-webhook" }
# ]

# ------------------
# Environment Variables
# ------------------
[vars]
APP_ENV = "production"
APP_URL = "https://lanternell.com"
AI_ACTIVE_PROVIDER = "zhipuai"
AI_FALLBACK_PROVIDER = "openai"
ZHIPUAI_MODEL = "glm-4.7"
ZHIPUAI_BASE_URL = "https://open.bigmodel.cn/api/paas/v4"
OPENAI_MODEL = "gpt-4o"
OPENAI_BASE_URL = "https://api.openai.com/v1"

# ------------------
# Secrets (set via wrangler CLI)
# ------------------
# npx wrangler secret put ZHIPUAI_API_KEY
# npx wrangler secret put OPENAI_API_KEY
# npx wrangler secret put STRIPE_SECRET_KEY
# npx wrangler secret put STRIPE_WEBHOOK_SECRET
# npx wrangler secret put RESEND_API_KEY
# npx wrangler secret put ADMIN_EMAIL_ALLOWLIST
